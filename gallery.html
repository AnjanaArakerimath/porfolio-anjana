<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — Dr. Anjana Arakerimath</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* ---- Gallery Page ---- */
    #gallery-section {
      padding: 30px 20px 40px;
      max-width: 860px;
      margin: 0 auto;
    }

    .gallery-title {
      text-align: center;
      font-size: 2rem;
      font-weight: 700;
      color: #101b38;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    .gallery-underline {
      width: 120px;
      height: 4px;
      background: linear-gradient(90deg, #91abd9, #c2c1ff);
      border-radius: 4px;
      margin: 0 auto 30px;
    }

    /* ---- Horizontal scroll track wrapper ---- */
    .h-scroll-wrapper {
      position: relative;
      overflow: hidden;
      width: 100%;
      border-radius: 14px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.18);
      background: transparent;
    }

    /* The moving strip */
    .h-scroll-track {
      display: flex;
      transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
    }

    /* Each slide cell */
    .h-scroll-track .slide {
      flex: 0 0 auto;
      width: 100%;
      height: 480px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(100deg, #c5d4ec 10%, #e8c8c0 90%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .h-scroll-track .slide img {
      width: 100%;
      height: 100%;
      object-fit: contain;   /* show full photo — no cropping */
      display: block;
    }

    /* Slide counter badge */
    .gallery-counter {
      position: absolute;
      bottom: 14px;
      right: 18px;
      background: rgba(16, 27, 56, 0.7);
      color: #c2c1ff;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      pointer-events: none;
      z-index: 10;
      letter-spacing: 0.5px;
    }

    /* Prev / Next arrow buttons */
    .gallery-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 20;
      background: rgba(0, 0, 0, 0.2);
      border: 2px solid black;
      color: black;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      backdrop-filter: blur(4px);
    }
    .gallery-btn.prev { left: 10px; }
    .gallery-btn.next { right: 10px; }

    /* Dot indicators */
    .gallery-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    .gallery-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(16, 27, 56, 0.25);
      border: 2px solid #91abd9;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    .gallery-dot.active {
      background: #c2c1ff;
      border-color: #c2c1ff;
      transform: scale(1.3);
    }

    @media (max-width: 600px) {
      .gallery-title { font-size: 1.4rem; }
      .h-scroll-wrapper {
        border-radius: 0;
        box-shadow: none;
        overflow: visible;
      }
      .h-scroll-track {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        transform: none !important; 
        transition: none;
      }
      .h-scroll-track .slide {
        height: 140px; 
        border-radius: 8px;
        background: transparent;
      }
      .h-scroll-track .slide img {
        object-fit: cover; 
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      }
      .gallery-counter, .gallery-btn, .gallery-dots {
        display: none !important; 
      }
    }
    @media (min-width: 601px) and (max-width: 992px) {
      .h-scroll-track .slide { height: 340px; }
    }
  </style>
  <link href="style.css" rel="stylesheet">
</head>
<body id="gallery_body">

    <div class="h-scroll-wrapper" id="galleryWrapper">

        <div class="slide"><img src="image/studentactivities/2025_session_2.png" alt="2025 Session 2"></div>

  <div id="footer"></div>

  <script>
    fetch('navbar.html')
      .then(response => response.text())
      .then(data => {
          document.getElementById('navbar').innerHTML = data;
      });

      // Global event delegation for navbar
      document.addEventListener('click', function(e) {
          const toggle = e.target.closest('#nav-toggle');
          if (toggle) {
              const nav = document.getElementById('nav-menu');
              if (nav) {
                  nav.classList.toggle('show-menu');
                  toggle.classList.toggle('show-icon');
              }
          }
          
          const dropdownBtn = e.target.closest('.dropdown__button');
          if (dropdownBtn) {
              const item = dropdownBtn.closest('.dropdown__item');
              if (item) {
                  const showDropdown = document.querySelector('.show-dropdown');
                  const dropdownContainer = item.querySelector('.dropdown__container');
                  if(item.classList.contains('show-dropdown')){
                      dropdownContainer.removeAttribute('style');
                      item.classList.remove('show-dropdown');
                  } else {
                      dropdownContainer.style.height = dropdownContainer.scrollHeight + 'px';
                      item.classList.add('show-dropdown');
                  }
                  
                  if(showDropdown && showDropdown !== item){
                      const oldContainer = showDropdown.querySelector('.dropdown__container');
                      if(oldContainer) oldContainer.removeAttribute('style');
                      showDropdown.classList.remove('show-dropdown');
                  }
              }
          }
      });
</script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>

  <script>
    fetch('footer.html')
      .then(r => r.text())
      .then(d => { document.getElementById('footer').innerHTML = d; });
  </script>

  <script>
    const track    = document.getElementById('galleryTrack');
    const slides   = track.querySelectorAll('.slide');
    const counter  = document.getElementById('galleryCounter');
    const dotsWrap = document.getElementById('galleryDots');
    const total    = slides.length;
    let current    = 0;
    let autoTimer;

    /* Build dots */
    slides.forEach((_, i) => {
      const dot = document.createElement('button');
      dot.className = 'gallery-dot' + (i === 0 ? ' active' : '');
      dot.setAttribute('aria-label', 'Go to slide ' + (i + 1));
      dot.addEventListener('click', () => goTo(i));
      dotsWrap.appendChild(dot);
    });

    function updateDots() {
      dotsWrap.querySelectorAll('.gallery-dot').forEach((d, i) => {
        d.classList.toggle('active', i === current);
      });
    }

    function goTo(index) {
      current = (index + total) % total;
      track.style.transform = `translateX(-${current * 100}%)`;
      counter.textContent = `${current + 1} / ${total}`;
      updateDots();
    }

    function next() { goTo(current + 1); }
    function prev() { goTo(current - 1); }

    /* Auto-scroll every 3 s */
    function startAuto() {
      autoTimer = setInterval(next, 3000);
    }
    function stopAuto() {
      clearInterval(autoTimer);
    }

    /* Pause on hover, resume on leave */
    const wrapper = document.getElementById('galleryWrapper');
    wrapper.addEventListener('mouseenter', stopAuto);
    wrapper.addEventListener('mouseleave', startAuto);

    /* Arrow buttons */
    document.getElementById('galleryNext').addEventListener('click', () => { stopAuto(); next(); startAuto(); });
    document.getElementById('galleryPrev').addEventListener('click', () => { stopAuto(); prev(); startAuto(); });

    /* Touch swipe support */
    let touchStartX = 0;
    wrapper.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; stopAuto(); }, { passive: true });
    wrapper.addEventListener('touchend', e => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 40) diff > 0 ? next() : prev();
      startAuto();
    }, { passive: true });

    /* Kick off */
    startAuto();
  </script>
</body>
</html>
