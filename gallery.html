<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anjana Arakerimath</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="style.css" rel="stylesheet">
    <style>
      body{
        background: linear-gradient(100deg, #f5f7fb 10%, #ffffff 90%);
      }
      
      #c1, #c2{
        box-shadow: 2px 1px 10px rgb(97 86 86);
      }
      #gallery_li{
        box-shadow: 3px 2px 3px 0px #bab2b2;
      }
      #gallery_link{
        color: #d06819;
        transform:scale(1.1) ; 
      }
      img{
        width: 100%;
        height: 500px;
      }
      .carousel {
          position: relative;
          width: 40%;
          height: 400px;
          overflow: hidden;
          margin: 50px;
      }
      .carousel img {
          /* width: 100%;
          height: 100%; */
          position: absolute;
          opacity: 0;
          transition: opacity 1s ease-in-out;
      }
      .carousel img.active {
          opacity: 1;
      }
      #c3
      {
        display: flex;
      }
      h1{
        margin-top: 50px; 
        margin-left: 44%;
      }
      #underline_div{
          width: 150px; 
          height: 5px; 
          background-color: #51536f; 
          margin-left: 45%;
        }
      
      @media (max-width: 768px) {
          #c3 {
              display: grid;
              grid-template-columns: 1fr;
              gap: 20px;
              height: 350px;
              width: 80%;
              margin-left: 2%;
          }
          .carousel{
            height: 350px;
            width: 100%;
          }
          footer{
            margin-top: 555px;
          }
          
      }
      @media (max-width: 368px){
        h1{
          margin-left: 26%;
        }
        #underline_div{
          margin-left: 20%;
        }
        #c3{
          height: 400px;
          width: 100%;
          margin-left: 0;
        }
        #c2,#c1{
          height: 100%;
          width: 100%;
          margin-left: 0;
        }
        img{
          height: 100%;
          width: 100%;
        }
        footer{
          margin-top: 50%;
        }
        
      }
       
    </style>
</head>
<body id="gallery_body">
  <div id="navbar"></div>
  <h1 >My Gallery</h1>
  <div id="underline_div"></div>
    <div class="container" id="c3">

    <div class="carousel" id="c2">
        <img src="image/gallery/1.jpg" alt=" 1" class="active">
        <img src="image/gallery/3.jpg" alt=" 3">
        <img src="image/gallery/4.jpg" alt=" 4">
        <img src="image/gallery/5.jpg" alt=" 5">
        <!-- <img src="image/gallery/6.jpg" alt=" 6"> -->
        <img src="image/gallery/7.jpg" alt=" 7">
        <img src="image/gallery/8.jpg" alt=" 8">
        <!-- <img src="image/gallery/9.jpg" alt=" 9"> -->
        <img src="image/gallery/10.jpg" alt=" 10">
        <img src="image/gallery/11.jpg" alt=" 11">
        <img src="image/gallery/12.jpg" alt=" 12">
        <img src="image/gallery/13.jpg" alt=" 13">
        <img src="image/gallery/27.jpg" alt=" 3">
    </div>
    <div class="carousel" id="c1">
      <img src="image/gallery/14.jpg" alt=" 1" class="active">
        <!-- <img src="image/gallery/15.jpg" alt=" 2">
        <img src="image/gallery/16jpg" alt=" 3"> -->
        <img src="image/gallery/17.jpg" alt=" 17">
        <img src="image/gallery/18.jpg" alt=" 18">
        <img src="image/gallery/19.jpg" alt=" 19">
        <img src="image/gallery/20.jpg" alt=" 20">
        <img src="image/gallery/21.jpg" alt=" 21">
        <img src="image/gallery/22.jpg" alt=" 22">
        <img src="image/gallery/23.jpg" alt=" 23">
        <img src="image/gallery/24.jpg" alt=" 24">
        <img src="image/gallery/25.jpg" alt=" 25">
        <img src="image/gallery/26.jpg" alt=" 26">
  </div>
    </div>
    <footer class="py-5 text-center">
      <div class="copyright">&copy;Anjana Arakerimath. All Of The Rights Reserved</div>
    </footer>
    <script>
      fetch('navbar.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('navbar').innerHTML = data;
        });


        const images = document.querySelectorAll('#c2 img');
        let currentIndex = 0;

        function changeImage() {
            images[currentIndex].classList.remove('active');
            currentIndex = (currentIndex + 1) % images.length;
            images[currentIndex].classList.add('active');
        }


        const images1 = document.querySelectorAll('#c1 img');
        let currentIndex1 = 0;
       
        function changeImage1() {
            images1[currentIndex1].classList.remove('active');
            currentIndex1 = (currentIndex1 + 1) % images1.length;
            images1[currentIndex1].classList.add('active');
        }

        setInterval(changeImage, 3500);
        setInterval(changeImage1, 2900);

    </script>
    
  
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>

</body>
</html>
