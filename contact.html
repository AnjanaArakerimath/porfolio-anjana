<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anjana Arakerimath</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
      body {
        margin: 0;
        padding: 0;
        background: linear-gradient(100deg, #f5f7fb 10%, #ffffff 90%);
        font-family: "Poppins", sans-serif;
      }
      #contact_link{
        color: #d06819;
        transform:scale(1.1) ; 
      }
      #contact_li{
        box-shadow: 3px 2px 3px 0px #bab2b2;
      }

      .contact-wrapper {
        max-width: 1100px;
        margin: 40px auto 60px;
        padding: 0 20px;
      }

      .section-title {
        text-align: center;
        font-size: 2rem;
        font-weight: 700;
        color: #101b38;
        margin-bottom: 6px;
        letter-spacing: 1px;
      }

      .section-underline {
        width: 120px;
        height: 4px;
        background: linear-gradient(90deg, #91abd9, #c2c1ff);
        border-radius: 4px;
        margin: 0 auto 40px;
      }

      .contact-card {
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 6px 20px rgba(16, 27, 56, 0.08);
        padding: 35px;
        height: 100%;
        border: none;
      }

      .contact-heading {
        color: #101b38;
        font-weight: 700;
        font-size: 1.4rem;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .contact-heading i {
        color: #91abd9;
      }

      .address-text {
        font-size: 1.05rem;
        color: #555;
        line-height: 1.7;
        margin-bottom: 25px;
      }

      .map-iframe {
        width: 100%;
        height: 320px;
        border-radius: 12px;
        border: none;
      }

      /* Social Buttons */
      .social-links {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-bottom: 35px;
        padding-bottom: 25px;
        border-bottom: 1px solid #eee;
      }
      .social-btn {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        background: #f5f7fb;
        color: #101b38;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        text-decoration: none;
        transition: all 0.3s ease;
        border: 2px solid transparent;
      }
      .social-btn img {
        width: 24px;
        height: 24px;
      }
      .social-btn:hover {
        background: #c2c1ff;
        color: #101b38;
        transform: translateY(-3px);
        box-shadow: 0 4px 10px rgba(194,193,255,0.5);
      }

      /* Form Styling */
      .form-control {
        border-radius: 8px;
        padding: 12px 15px;
        border: 1px solid #ddd;
        background: #fafafa;
        margin-bottom: 20px;
        font-size: 0.95rem;
        transition: border-color 0.3s, box-shadow 0.3s;
      }
      .form-control:focus {
        border-color: #91abd9;
        box-shadow: 0 0 0 3px rgba(145, 171, 217, 0.2);
        background: #fff;
      }
      
      .send-btn {
        background: linear-gradient(135deg, #101b38 0%, #1e3a5f 100%);
        color: white;
        border: none;
        padding: 12px 30px;
        border-radius: 30px;
        font-weight: 600;
        font-size: 1rem;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        transition: all 0.3s ease;
        cursor: pointer;
      }
      .send-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 15px rgba(16, 27, 56, 0.25);
        color: white;
      }

      @media (max-width: 768px) {
        .contact-card { padding: 25px; }
      }
    </style>
  <link href="style.css" rel="stylesheet">
</head>
<body id="contact_body">
  <div id="navbar"></div>

  <section id="contact" class="contact-wrapper">
    <h1 class="section-title">Contact Me</h1>
    <div class="section-underline"></div>

    <div class="row g-4">
      <!-- Left Column: Address & Map -->
      <div class="col-lg-6">
        <div class="contact-card">
          <h3 class="contact-heading"><i class="fa-solid fa-location-dot"></i> Office Address</h3>
          <p class="address-text">
            Department of MCA, <br>
            Pimpri Chinchwad College of Engineering,<br>
            Sector - 26, Pradhikaran, Nigdi, Pune - 411 044, India.
          </p>
          <iframe class="map-iframe" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3780.273282914893!2d73.75906487496628!3d18.651728782467472!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bc2b9e76c8fa205%3A0x1b210131915734fd!2sPCCOE%20-%20Pimpri%20Chinchwad%20College%20Of%20Engineering!5e0!3m2!1sen!2sin!4v1723305831159!5m2!1sen!2sin" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
      </div>

      <!-- Right Column: Socials & Form -->
      <div class="col-lg-6">
        <div class="contact-card">
          
          <div class="social-links">
            <a href="https://www.instagram.com/arakerimathanjana?igsh=MXA4d2plMG4xY3Y5cw==" class="social-btn" title="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="https://www.linkedin.com/in/anjana-arakerimath-47a606147/" class="social-btn" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
            <a href="https://scholar.google.co.in/citations?user=Sgd9lfcAAAAJ&hl=en" class="social-btn" title="Google Scholar"><img src="image/google_scholor_logo.png" alt="Scholar"></a>
            <a href="mailto:a.anjana@pccoepune.org" class="social-btn" title="Email"><i class="fa fa-envelope-open-text"></i></a>
          </div>

          <h3 class="contact-heading" style="margin-bottom: 20px;"><i class="fa-regular fa-paper-plane"></i> Send a Message</h3>
          
          <form id="contact-form" action="" method="POST">
            <input type="text" class="form-control" id="name" placeholder="Full Name" name="name" required>
            <input type="email" class="form-control" id="email" placeholder="Email Address" name="email" required>
            <textarea class="form-control" rows="5" placeholder="Your Message..." name="message" required></textarea>
            
            <button class="send-btn" type="submit">
              <i class="fa fa-paper-plane"></i> Send Message
            </button>
          </form>

        </div>
      </div>
    </div>
  </section>  <div id="footer"></div>
  <script>
    fetch('navbar.html')
      .then(response => response.text())
      .then(data => {
          document.getElementById('navbar').innerHTML = data;
      });

      // Global event delegation for navbar
      document.addEventListener('click', function(e) {
          const toggle = e.target.closest('#nav-toggle');
          if (toggle) {
              const nav = document.getElementById('nav-menu');
              if (nav) {
                  nav.classList.toggle('show-menu');
                  toggle.classList.toggle('show-icon');
              }
          }
          
          const dropdownBtn = e.target.closest('.dropdown__button');
          if (dropdownBtn) {
              const item = dropdownBtn.closest('.dropdown__item');
              if (item) {
                  const showDropdown = document.querySelector('.show-dropdown');
                  const dropdownContainer = item.querySelector('.dropdown__container');
                  if(item.classList.contains('show-dropdown')){
                      dropdownContainer.removeAttribute('style');
                      item.classList.remove('show-dropdown');
                  } else {
                      dropdownContainer.style.height = dropdownContainer.scrollHeight + 'px';
                      item.classList.add('show-dropdown');
                  }
                  
                  if(showDropdown && showDropdown !== item){
                      const oldContainer = showDropdown.querySelector('.dropdown__container');
                      if(oldContainer) oldContainer.removeAttribute('style');
                      showDropdown.classList.remove('show-dropdown');
                  }
              }
          }
      });
</script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>

      
  <script>
    fetch('footer.html')
      .then(response => response.text())
      .then(data => {
          document.getElementById('footer').innerHTML = data;
      });
  </script>
  <script src="config.js"></script>
  <script>
    document.getElementById('contact-form').action = ENV.FORMSPREE_URL;
  </script>
</body>
</html>
