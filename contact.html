<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anjana Arakerimath</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="style.css" rel="stylesheet">
    <style>
     
      body {
        margin: 0;
        padding: 0;
        background-color: aliceblue;
      }
      #contact_link{
        color: #d06819;
        transform:scale(1.1) ; 
      }
      #contact_li{
        box-shadow: 3px 2px 3px 0px #bab2b2;
      }
      .section-header{
        margin: 20px 0 20px 0;
        text-decoration: underline;
      }
      #contact_div{
        height: 800px;
      }
      #map_col{
        margin: 0 2% 0 4%;
       
      }
      #form_col{
        margin: 2%;
       
      }
      
      #map_col, #form_col{
          display: inline-block;
          width: 44%;
        }
      .form-group{
          box-shadow: 1px 1px 5px #d4d2d2; 
          width: 100%;     
        }
      .form-control{
        margin: 20px;
        
      }
      #office_ad{
        font-size: 25px;
        color: rgb(12, 19, 159); 
      }
      #office_dec{
        font-size: 20px;
      }
      #map{
        width: 80%;
        height: 420px;
        margin-top: 5%;
      }
      #submit{
        margin-left: 20px;
      }
      footer{
        margin-top: 10px;
      }
      .effect .buttons{
        justify-content: center; 
         box-shadow: 1px 1px 5px rgb(189 190 194); 
        background-color: #f4f4ee;
      }
      @media only screen and (max-width:768px) {
        #map_col, #form_col{
          display: block;
          width: 90%;
          padding: 0;
        }
        #map{
          width: 90%;
        }
        
      }
      @media only screen and (max-width:400px) {
        #office_ad{
          font-size: 20px;
        }
        #office_desc{
          font-size: 15px;
        }
        #map{
          height: 200px;
          /* margin-left: 2%; */
          width: 98%;
        }
        .form-control{
          margin-left: 3%;
        }
        .effect .buttons{
          width: 100%;
          margin-left: 2%;
        }
      }
      </style>
</head>
<body id="contact_body">
  <div id="navbar"></div>

  <section id="contact">

    <h1 class="section-header" align="center">Contact</h1>
          <div class="col" id="map_col">
            <p id="office_ad">Office Address: </p>
            <p id="office_desc">
              Department of MCA, <br>
              Pimpri Chinchwad College of Engineering,<br>
              Sector - 26, Pradhikaran, Nigdi, Pune - 411 044, India.
            </p>
            <iframe id="map"  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3780.273282914893!2d73.75906487496628!3d18.651728782467472!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bc2b9e76c8fa205%3A0x1b210131915734fd!2sPCCOE%20-%20Pimpri%20Chinchwad%20College%20Of%20Engineering!5e0!3m2!1sen!2sin!4v1723305831159!5m2!1sen!2sin" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
          </div>

          <div class="col" id="form_col">
            <div class="effect varrius">
              <div class="buttons" >
                
                <a href="https://www.instagram.com/arakerimathanjana?igsh=MXA4d2plMG4xY3Y5cw=="  class="insta" title="Join us on Instagram"><i class="fab fa-instagram" aria-hidden="true"></i></a>
                <a href="https://www.linkedin.com/in/anjana-arakerimath-47a606147/"  class="in" title="Join us on Linked In"><i class="fab fa-linkedin" aria-hidden="true"></i></a>
                <a href="https://scholar.google.co.in/citations?user=Sgd9lfcAAAAJ&hl=en"  class="g-plus" title=" google scholor">      
                  <img src="image/google_scholor_logo.png" width="30px" height="30px">
                </a>
                <a href="mailto: a.anjana@pccoepune.org"   class="fb" title="a.anjana@pccoepune.org">
                  <i class="fa fa-envelope-open-text"></i>
                </a>
              </div>
            
            <form id="contact-form" class="form-horizontal" role="form" action="https://formspree.io/f/movabzwg" method="POST">
          
              <div class="form-group">
                
                <input type="text" class="form-control" style="width: 92%;" id="name" placeholder="NAME" name="name" value="" required>
              
                <input type="email" class="form-control" style="width: 92%;" id="email" placeholder="EMAIL" name="email" value="" required>
               
                <textarea class="form-control" rows="10" style="width: 92%;" placeholder="MESSAGE" name="message" required></textarea>
              
                <button class="btn btn-primary send-button" id="submit" type="submit" value="SEND">
                  <div class="alt-send-button">
                    <i class="fa fa-paper-plane"></i><span class="send-text">SEND</span>
                  </div>
                </button>
              </div>
              
            </form>
          </div>
       
      
    
  </section>  

  <footer class="py-5 text-center">
      <div class="copyright" style="color: white;">&copy;Anjana Arakerimath. All Of The Rights Reserved</div>
  </footer>
  <script>
    fetch('navbar.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('navbar').innerHTML = data;
        });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>

      
</body>
</html>
