<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Induction Program — Dr. Anjana Arakerimath</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .container {
          width: 90%;
          max-width: 1200px;
          margin: 0 auto;
          padding: 20px;
        }
        .card {
            font-weight: 700;
            color: black;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            background: #fff;
            width: 98%;
            padding: 20px;
            margin-left: 1%;
            margin-top: 3%;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }
        .card_ul { color: black; }
        .icon { width:60px; height:70px; }
        .heading { margin-left: 0; margin-top: 18px; }
        @media (max-width: 540px) {
          .icon { height: 55px; width: 55px; }
        }
        @media (max-width: 368px) {
          .icon { height: 50px; width: 50px; }
          .card { margin-left: 0; margin-right: 0; padding-left: 0; padding-right: 0; }
        }
    </style>
  <link href="style.css" rel="stylesheet">
</head>
<body>
    <div id="navbar"></div>

    <section class="card">
        <div class="container">
          <div class="row">
            <div class="col-1">
              <img src="image/econtri.png" class="icon">
            </div>
            <div class="col">
              <h2 class="heading">Student Induction Program</h2>
            </div>
          </div>
        </div>
        <div class="card_ul" style="margin-top: 15px; padding: 10px;">

          <div class="row mb-4">
            <div class="col-md-6 mb-3">
              <img src="image/induction/induction_1.png" class="img-fluid rounded shadow-sm" alt="Induction Activity 1">
            </div>
            <div class="col-md-6 mb-3">
              <img src="image/induction/induction_2.png" class="img-fluid rounded shadow-sm" alt="Induction Activity 2">
            </div>
          </div>
        </div>
    </section>

    <div id="footer"></div>
    <script>
      fetch('navbar.html')
      .then(response => response.text())
      .then(data => {
          document.getElementById('navbar').innerHTML = data;
      });

      // Global event delegation for navbar
      document.addEventListener('click', function(e) {
          const toggle = e.target.closest('#nav-toggle');
          if (toggle) {
              const nav = document.getElementById('nav-menu');
              if (nav) {
                  nav.classList.toggle('show-menu');
                  toggle.classList.toggle('show-icon');
              }
          }
          
          const dropdownBtn = e.target.closest('.dropdown__button');
          if (dropdownBtn) {
              const item = dropdownBtn.closest('.dropdown__item');
              if (item) {
                  const showDropdown = document.querySelector('.show-dropdown');
                  const dropdownContainer = item.querySelector('.dropdown__container');
                  if(item.classList.contains('show-dropdown')){
                      dropdownContainer.removeAttribute('style');
                      item.classList.remove('show-dropdown');
                  } else {
                      dropdownContainer.style.height = dropdownContainer.scrollHeight + 'px';
                      item.classList.add('show-dropdown');
                  }
                  
                  if(showDropdown && showDropdown !== item){
                      const oldContainer = showDropdown.querySelector('.dropdown__container');
                      if(oldContainer) oldContainer.removeAttribute('style');
                      showDropdown.classList.remove('show-dropdown');
                  }
              }
          }
      });
</script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <script>
      fetch('footer.html')
        .then(response => response.text())
        .then(data => { document.getElementById('footer').innerHTML = data; });
    </script>
</body>
</html>
