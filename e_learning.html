<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anjana Arakerimath</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        #e_learning_li{
           box-shadow: 3px 2px 3px 0px #bab2b2;
           color: rgb(182, 182, 238);
        }
        #e_learning_link{
            color: #d06819;
            transform:scale(1.1) ; 
        }
        
        html, body {
            height: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
        }
        #project_div {
            flex: 1; 
        }
        .row {
            display: flex;
            align-items: center; /* Aligns items in the center vertically */
        }

        #divcol1 {
            flex: 2; /* Takes up more space */
        }

        #divcol2 {
            flex: 1; /* Takes up less space */
            text-align: center; /* Centers the image */
        }

        #img2 {
            max-width: 100%; /* Ensures the image is responsive */
            height: auto;
        }
        .same_li{
            padding: 16px 4px;
            font-weight: 700;
            list-style: none;
        }
        .elearn-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            font-size: 1.15rem;
            font-weight: 700;
            color: #2a087d;
            background: linear-gradient(135deg, #c2c1ff 0%, #91abd9 100%);
            border-radius: 30px;
            text-decoration: none;
            box-shadow: 0 4px 14px rgba(145,171,217,0.4);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            border: 2px solid rgb(0, 0, 0);
            cursor: pointer;
        }
        .elearn-btn:hover {
            background: linear-gradient(135deg, #a8a7ff 0%, #6f93cf 100%);
            color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(145,171,217,0.55);
        }
        .elearn-btn i {
            font-size: 1.2rem;
        }
        </style>
  <link href="style.css" rel="stylesheet">
</head>
<body>
    <div id="navbar"></div>
    <div class="container-flex" id="project_div">
        <h1 class="heading">
            E-Learning Content 
        </h1>
        <h3 class="heading1" style="color: #3636ff;">
        </h3>
        <hr>
        <div class="row">
            <div class="col-md-8" id="divcol1">
                <ul type="none" id="project_ul" class="heading3" style="padding-left: 0;">
                    <li class="same_li">
                        <a href="https://classroom.google.com/c/NjUzNzAyNDQ2Nzgz?cjc=6u7k7aj" target="_blank" class="elearn-btn">
                            <i class="fa-solid fa-book-open"></i> Project Management
                        </a>
                    </li>
                    <li class="same_li">
                        <a href="https://classroom.google.com/c/NzEyNDkxMTE1Njgz?cjc=vqzuyoo" target="_blank" class="elearn-btn">
                            <i class="fa-solid fa-code"></i> Software Engineering
                        </a>
                    </li>
                    <li class="same_li">
                        <a href="https://classroom.google.com/c/NzAyMjc0NTg3MDU1?cjc=ipkl2p6" target="_blank" class="elearn-btn">
                            <i class="fa-solid fa-flask"></i> Research Methodology
                        </a>
                    </li>
                </ul>
            </div>
            <div class="col" id="divcol2">
                <img src="image/elearning.webp" id="img2">
            </div>
        </div>
    </div>  <div id="footer"></div>
    <script>
      fetch('navbar.html')
      .then(response => response.text())
      .then(data => {
          document.getElementById('navbar').innerHTML = data;
      });

      // Global event delegation for navbar
      document.addEventListener('click', function(e) {
          const toggle = e.target.closest('#nav-toggle');
          if (toggle) {
              const nav = document.getElementById('nav-menu');
              if (nav) {
                  nav.classList.toggle('show-menu');
                  toggle.classList.toggle('show-icon');
              }
          }
          
          const dropdownBtn = e.target.closest('.dropdown__button');
          if (dropdownBtn) {
              const item = dropdownBtn.closest('.dropdown__item');
              if (item) {
                  const showDropdown = document.querySelector('.show-dropdown');
                  const dropdownContainer = item.querySelector('.dropdown__container');
                  if(item.classList.contains('show-dropdown')){
                      dropdownContainer.removeAttribute('style');
                      item.classList.remove('show-dropdown');
                  } else {
                      dropdownContainer.style.height = dropdownContainer.scrollHeight + 'px';
                      item.classList.add('show-dropdown');
                  }
                  
                  if(showDropdown && showDropdown !== item){
                      const oldContainer = showDropdown.querySelector('.dropdown__container');
                      if(oldContainer) oldContainer.removeAttribute('style');
                      showDropdown.classList.remove('show-dropdown');
                  }
              }
          }
      });
</script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>

  <script>
    fetch('footer.html')
      .then(response => response.text())
      .then(data => {
          document.getElementById('footer').innerHTML = data;
      });
  </script>
</body>
</html>
