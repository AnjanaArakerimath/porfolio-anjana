<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anjana Arakerimath</title>
    <link href="style.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        #e_learning_li{
           box-shadow: 3px 2px 3px 0px #bab2b2;
           color: rgb(182, 182, 238);
        }
        #e_learning_link{
            color: #d06819;
            transform:scale(1.1) ; 
        }
        footer {
            background: #f8f9fa; /* Optional: Gives the footer a background color */
            padding: 10px 0;
        }
        html, body {
            height: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
        }
        #project_div {
            flex: 1; 
        }
        .row {
            display: flex;
            align-items: center; /* Aligns items in the center vertically */
        }

        #divcol1 {
            flex: 2; /* Takes up more space */
        }

        #divcol2 {
            flex: 1; /* Takes up less space */
            text-align: center; /* Centers the image */
        }

        #img2 {
            max-width: 100%; /* Ensures the image is responsive */
            height: auto;
        }
        .same_li{
            padding: 20px;
            font-weight: 700;
        }
        @media only screen and (max-width:448px) {
            #img2{
                display: none;
            }
        }

    </style>
</head>
<body>
    <div id="navbar"></div>
    <div class="container-flex" id="project_div">
        <h1 class="heading">
            E-Learning Content 
        </h1>
        <h3 class="heading1" style="color: #3636ff;">
        </h3>
        <hr>
        <div class="row">
            <div class="col-md-8" id="divcol1">
                <ul type="circle" id="project_ul" class="heading3">
                    <li class="same_li">
                        Project management
                        <a href="https://classroom.google.com/c/NjUzNzAyNDQ2Nzgz?cjc=6u7k7aj" title="click to know more"><img src="image/link_icon.png"></a>
                    </li>
                    <li class="same_li">
                        software engineering
                        <a href="https://classroom.google.com/c/NzEyNDkxMTE1Njgz?cjc=vqzuyoo" title="click to know more"><img src="image/link_icon.png"></a>
                    </li>
                    <li class="same_li">
                        Research methodology
                        <a href="https://classroom.google.com/c/NzAyMjc0NTg3MDU1?cjc=ipkl2p6" title="click to know more"><img src="image/link_icon.png"></a>
                    </li>
                </ul>
            </div>
            <div class="col" id="divcol2">
                <img src="image/elearning.webp" id="img2">
            </div>
        </div>
    </div>
    <footer class="py-5 text-center">
        <div class="copyright">&copy;Anjana Arakerimath. All Of The Rights Reserved</div>
    </footer>
    <script>
      fetch('navbar.html')
          .then(response => response.text())
          .then(data => {
              document.getElementById('navbar').innerHTML = data;
          });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>

</body>
